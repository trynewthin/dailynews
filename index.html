<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI 精选每日新闻速递" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <title>Daily News</title>
  <script>
    // Restore theme mode & visual style from zustand persisted store
    (function () {
      try {
        var raw = localStorage.getItem('dailynews-theme');
        if (raw) {
          var state = JSON.parse(raw).state;
          if (state.mode === 'dark') document.documentElement.classList.add('dark');
          if (state.style) document.documentElement.setAttribute('data-style', state.style);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
